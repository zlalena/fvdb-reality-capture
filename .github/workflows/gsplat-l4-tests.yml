#
# Lightweight workflow to run gsplat's own unit tests on an L4 GPU.
# Used to diagnose GPU-specific rendering issues (L4 produces garbage
# eval renders while Ada works fine).
name: gsplat L4 Unit Tests

on:
  workflow_dispatch:
    inputs:
      gsplat_commit:
        description: "GSplat commit to test (default: pinned HEAD)"
        required: false
        default: "b60e917c95afc449c5be33a634f1f457e116ff5e"

concurrency:
  group: gsplat-l4-tests
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  start-gpu-runner:
    if: ${{ github.repository == 'openvdb/fvdb-reality-capture' }}
    name: Start L4 GPU runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-runner.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420032683002:role/openvdb-fvdb-github-actions-role
          aws-region: us-east-2
      - name: Start EC2 GPU runner
        id: start-runner
        uses: machulav/ec2-github-runner@v2.4.3
        with:
          mode: start
          github-token: ${{ secrets.EC2_RUNNERS_ACTION }}
          ec2-image-id: ami-0f5c0b65fde08ae43
          ec2-instance-type: g6.xlarge
          subnet-id: subnet-03f2320d6e6e0005b
          security-group-id: sg-0cd08bd89d6212223

  gsplat-tests:
    if: ${{ github.repository == 'openvdb/fvdb-reality-capture' }}
    needs: start-gpu-runner
    name: gsplat Unit Tests on L4
    runs-on: ${{ needs.start-gpu-runner.outputs.label }}
    container:
      image: aswf/ci-openvdb:2024-clang17.2
      env:
        PYTHONPATH: ""
      options: --rm --shm-size 16gb
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda env
        uses: mamba-org/setup-micromamba@v2
        with:
          cache-environment: false
          post-cleanup: 'all'
          environment-name: gsplat-test
          environment-file: tests/benchmarks/comparative/docker/benchmark_environment.yml

      - name: Clone and build GSplat
        run: |
          micromamba activate gsplat-test
          mkdir -p /workspace
          GSPLAT_COMMIT="${{ inputs.gsplat_commit }}"
          git clone https://github.com/nerfstudio-project/gsplat.git /workspace/gsplat
          cd /workspace/gsplat && git checkout "${GSPLAT_COMMIT}" && git submodule update --init --recursive
          echo "GSplat commit: $(git rev-parse HEAD)"
          archs=$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader 2>/dev/null \
                  | awk NF | sort -u | sed 's/$/+PTX/')
          [ -z "$archs" ] && archs="8.9+PTX"
          export TORCH_CUDA_ARCH_LIST="$archs"
          echo "Building GSplat with TORCH_CUDA_ARCH_LIST=$TORCH_CUDA_ARCH_LIST"
          pip install -v --no-build-isolation --no-cache-dir /workspace/gsplat

      - name: GPU info
        run: |
          nvidia-smi
          micromamba activate gsplat-test
          python -c "
          import torch
          print(f'PyTorch: {torch.__version__}')
          print(f'CUDA: {torch.version.cuda}')
          print(f'GPU: {torch.cuda.get_device_name(0)}')
          print(f'Compute capability: {torch.cuda.get_device_capability(0)}')
          print(f'VRAM: {torch.cuda.get_device_properties(0).total_mem / 1e9:.1f} GB')
          "

      - name: Run gsplat unit tests
        run: |
          micromamba activate gsplat-test
          cd /workspace/gsplat
          python -m pytest tests/test_basic.py tests/test_rasterization.py tests/test_strategy.py -v --tb=long 2>&1 | tee /tmp/gsplat_test_results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsplat-l4-test-results-${{ github.run_id }}
          path: /tmp/gsplat_test_results.txt
          retention-days: 30

  stop-gpu-runner:
    if: ${{ always() && github.repository == 'openvdb/fvdb-reality-capture' && needs.start-gpu-runner.result != 'skipped' }}
    name: Stop L4 GPU runner
    needs:
      - start-gpu-runner
      - gsplat-tests
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420032683002:role/openvdb-fvdb-github-actions-role
          aws-region: us-east-2
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2.4.3
        with:
          mode: stop
          github-token: ${{ secrets.EC2_RUNNERS_ACTION }}
          label: ${{ needs.start-gpu-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-gpu-runner.outputs.ec2-instance-id }}
