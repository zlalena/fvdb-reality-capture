name: Publish fVDB Reality Capture Package

on:
  release:
    types: [published]
  push:
    branches:
      - 'release/v[0-9]*'
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target: testpypi | s3 | none"
        required: false
        default: "testpypi"
      run_validation:
        description: "Run GPU validation tests on built package"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  ##############################################################################
  # DETERMINE PUBLISH ROUTING
  ##############################################################################
  pr-flags:
    name: Determine publish flags
    runs-on: ubuntu-latest
    outputs:
      s3: ${{ steps.flags.outputs.s3 }}
      release_push: ${{ steps.flags.outputs.release_push }}
    steps:
      - name: Compute publish routing flags
        id: flags
        uses: actions/github-script@v7
        with:
          script: |
            const isPush = context.eventName === 'push';
            let s3 = '${{ inputs.publish_target }}' == 's3';
            let releasePush = false;
            if (isPush) {
              s3 = true;
              releasePush = true;
            }
            core.setOutput('s3', s3 ? 'true' : 'false');
            core.setOutput('release_push', releasePush ? 'true' : 'false');

  ##############################################################################
  # BUILD PACKAGE
  ##############################################################################
  fvdb-rc-build:
    name: Build fVDB Reality Capture package
    needs: pr-flags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Add post-release version for TestPyPI
        if: ${{ needs.pr-flags.outputs.s3 == 'false' }}
        run: |
          VERSION_LINE=$(grep '^version *= *"' pyproject.toml)
          VERSION=$(echo "$VERSION_LINE" | sed -E 's/^version *= *"([^"]+)".*/\1/')
          if [ "${GITHUB_RUN_NUMBER:-${{ github.run_number }}}" -gt 1 ]; then
            NEW_VERSION="${VERSION}.post${GITHUB_RUN_NUMBER:-${{ github.run_number }}}"
            sed -i -E "s/^version *= *\"[^\"]+\"/version = \"${NEW_VERSION}\"/" pyproject.toml
            echo "Updated version to $NEW_VERSION"
          else
            echo "Version unchanged: $VERSION"
          fi
          grep '^version' pyproject.toml

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fvdb-rc-dist
          path: dist/
          retention-days: 7

  ##############################################################################
  # PUBLISH TO PYPI / TESTPYPI
  ##############################################################################
  publish-dist:
    name: Publish to PyPI/TestPyPI
    needs:
      - pr-flags
      - fvdb-rc-build
    if: ${{ !cancelled() && needs.fvdb-rc-build.result == 'success' && needs.pr-flags.outputs.s3 != 'true' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ (github.event_name == 'release' && 'pypi') || 'testpypi' }}
      url: ${{ (github.event_name == 'release' && 'https://pypi.org/p/fvdb-reality-capture') || 'https://test.pypi.org/p/fvdb-reality-capture' }}

    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: fvdb-rc-dist
          path: dist

      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ (github.event_name == 'release' && 'https://upload.pypi.org/legacy/') || 'https://test.pypi.org/legacy/' }}
          verbose: true

  ##############################################################################
  # PUBLISH TO S3 STAGING
  ##############################################################################
  publish-to-s3:
    name: Publish to S3 Simple Index
    needs: [pr-flags, fvdb-rc-build]
    if: ${{ !cancelled() && needs.pr-flags.outputs.s3 == 'true' && needs.fvdb-rc-build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: fvdb-packages
      SIMPLE_PREFIX: ${{ github.event_name == 'release' && 'simple' || 'simple-staging' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420032683002:role/openvdb-fvdb-github-actions-role
          aws-region: us-east-2

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: fvdb-rc-dist
          path: dist

      - name: Determine normalized project name
        id: proj
        run: |
          set -euo pipefail
          shopt -s nullglob
          FIRST_WHL=$(ls dist/*.whl | head -n1)
          if [ -z "${FIRST_WHL:-}" ]; then
            echo "No wheels found in dist/" >&2; exit 1
          fi
          BASE=$(basename "$FIRST_WHL")
          PROJECT=${BASE%%-*}
          NORM=$(echo "$PROJECT" | tr '[:upper:]' '[:lower:]' | sed -E 's/[-_.]+/-/g')
          echo "project_name=$PROJECT" >> $GITHUB_OUTPUT
          echo "normalized=$NORM" >> $GITHUB_OUTPUT
          echo "Project: $PROJECT, Normalized: $NORM"

      - name: Prune staging wheels older than 30 days
        if: ${{ env.SIMPLE_PREFIX == 'simple-staging' }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '30 days ago' '+%Y-%m-%d')
          echo "Pruning staging wheels uploaded before $CUTOFF"
          LISTING=$(aws s3 ls "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${{ steps.proj.outputs.normalized }}/" 2>/dev/null || true)
          if [ -z "$LISTING" ]; then
            echo "No existing wheels found -- nothing to prune"
            exit 0
          fi
          DELETED=0
          while read -r line; do
            DATE_PART=$(echo "$line" | awk '{print $1}')
            FILE_PART=$(echo "$line" | awk '{print $4}')
            if [[ "$FILE_PART" == *.whl ]] && [[ "$DATE_PART" < "$CUTOFF" ]]; then
              echo "Removing: $FILE_PART (uploaded $DATE_PART)"
              aws s3 rm "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${{ steps.proj.outputs.normalized }}/$FILE_PART" --only-show-errors
              DELETED=$((DELETED + 1))
            fi
          done <<< "$LISTING"
          echo "Pruned $DELETED old staging wheel(s)"

      - name: Upload wheels and sdist to S3
        run: |
          set -euo pipefail
          DEST="s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${{ steps.proj.outputs.normalized }}/"
          echo "Uploading packages to $DEST"
          shopt -s nullglob
          upload_failed=0
          for pkg in dist/*.whl dist/*.tar.gz; do
            echo "Uploading $pkg"
            if aws s3 cp "$pkg" "$DEST"; then
              echo "Successfully uploaded $pkg"
            else
              echo "FAILED to upload $pkg"
              upload_failed=1
            fi
          done
          if [ $upload_failed -eq 1 ]; then
            echo "ERROR: One or more uploads failed"
            exit 1
          fi
          echo "All packages uploaded successfully"
          sleep 2

      - name: Generate project index.html
        run: |
          set -euo pipefail
          OUTDIR="dist/index-gen/${{ steps.proj.outputs.normalized }}"
          mkdir -p "$OUTDIR"
          INDEX_FILE="$OUTDIR/index.html"
          TITLE="Links for ${{ steps.proj.outputs.project_name }}"
          wheels=$(aws s3 ls "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${{ steps.proj.outputs.normalized }}/" | { grep -E '\.(whl|tar\.gz)$' || true; } | awk '{print $4}')

          {
            echo "<!DOCTYPE html>";
            echo "<html><head><meta charset=\"utf-8\"><title>${TITLE}</title></head><body>";
            echo "<h1>${TITLE}</h1>";
            for pkg in $wheels; do
              if [ -f "dist/$pkg" ]; then
                sha=$(sha256sum "dist/$pkg" | awk '{print $1}')
              else
                aws s3 cp "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${{ steps.proj.outputs.normalized }}/$pkg" "/tmp/$pkg" --only-show-errors
                sha=$(sha256sum "/tmp/$pkg" | awk '{print $1}')
                rm "/tmp/$pkg"
              fi
              echo "<a href=\"${pkg}#sha256=${sha}\">${pkg}</a><br/>";
            done;
            echo "</body></html>";
          } > "$INDEX_FILE"

          aws s3 cp "$INDEX_FILE" "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/${{ steps.proj.outputs.normalized }}/index.html" --content-type text/html --only-show-errors

      - name: Generate root simple index.html
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          ROOT_INDEX="$TMPDIR/index.html"
          projects=$(aws s3 ls "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/" | awk '{print $2}' | sed 's:/$::')
          TITLE="Simple index"
          {
            echo "<!DOCTYPE html>";
            echo "<html><head><meta charset=\"utf-8\"><title>${TITLE}</title></head><body>";
            echo "<h1>${TITLE}</h1>";
            for p in $projects; do
              echo "<a href=\"${p}/\">${p}</a><br/>";
            done;
            echo "</body></html>";
          } > "$ROOT_INDEX"
          aws s3 cp "$ROOT_INDEX" "s3://${S3_BUCKET}/${SIMPLE_PREFIX}/index.html" --content-type text/html --only-show-errors

  ##############################################################################
  # GPU VALIDATION: DISCOVER FVDB-CORE VERSIONS + SMOKE TEST + UNIT TESTS
  ##############################################################################
  discover-fvdb-core:
    name: Discover fvdb-core versions from S3 staging
    needs: [pr-flags, fvdb-rc-build]
    if: ${{ !cancelled() && needs.fvdb-rc-build.result == 'success' && (needs.pr-flags.outputs.release_push == 'true' || inputs.run_validation == true) }}
    runs-on: ubuntu-latest
    outputs:
      torch-version: ${{ steps.discover.outputs.torch_version }}
      cuda-tag: ${{ steps.discover.outputs.cuda_tag }}
      cuda-image-tag: ${{ steps.discover.outputs.cuda_image_tag }}
      pytorch-index: ${{ steps.discover.outputs.pytorch_index }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420032683002:role/openvdb-fvdb-github-actions-role
          aws-region: us-east-2
      - name: Discover fvdb-core versions from S3 staging
        id: discover
        run: |
          set -euo pipefail
          LISTING=$(aws s3 ls s3://fvdb-packages/simple-staging/fvdb-core/ 2>/dev/null | grep '\.whl$' | awk '{print $4}' || true)
          if [ -z "$LISTING" ]; then
            echo "ERROR: No fvdb-core wheels found in S3 staging" >&2
            exit 1
          fi
          echo "Available wheels:"
          echo "$LISTING"

          # Pick the first wheel (any Python version) to extract version tags
          WHEEL=$(echo "$LISTING" | head -1)
          echo "Selected wheel: $WHEEL"

          # Extract local version tag: +pt210.cu128
          LOCAL_TAG=$(echo "$WHEEL" | grep -oP '\+pt\d+\.cu\d+' || true)
          if [ -z "$LOCAL_TAG" ]; then
            echo "ERROR: Could not parse local version tag from wheel: $WHEEL" >&2
            exit 1
          fi
          echo "Local version tag: $LOCAL_TAG"

          # Parse torch version: pt210 -> 2.10.0
          PT_DIGITS=$(echo "$LOCAL_TAG" | grep -oP 'pt\K\d+')
          TORCH_MAJOR=${PT_DIGITS:0:1}
          TORCH_MINOR=${PT_DIGITS:1}
          TORCH_VERSION="${TORCH_MAJOR}.${TORCH_MINOR}.0"

          # Parse CUDA tag: cu128
          CUDA_TAG=$(echo "$LOCAL_TAG" | grep -oP 'cu\d+')

          # Map CUDA tag to container image tag
          case "$CUDA_TAG" in
            cu118) CUDA_IMAGE_TAG="11.8.0" ;;
            cu121) CUDA_IMAGE_TAG="12.1.1" ;;
            cu124) CUDA_IMAGE_TAG="12.4.1" ;;
            cu128) CUDA_IMAGE_TAG="12.8.1" ;;
            cu130) CUDA_IMAGE_TAG="13.0.2" ;;
            *) echo "WARNING: Unknown CUDA tag $CUDA_TAG, defaulting to 12.8.1" >&2
               CUDA_IMAGE_TAG="12.8.1" ;;
          esac

          PYTORCH_INDEX="https://download.pytorch.org/whl/${CUDA_TAG}"

          echo "Discovered: torch=$TORCH_VERSION cuda=$CUDA_TAG image=$CUDA_IMAGE_TAG"
          echo "torch_version=$TORCH_VERSION" >> $GITHUB_OUTPUT
          echo "cuda_tag=$CUDA_TAG" >> $GITHUB_OUTPUT
          echo "cuda_image_tag=$CUDA_IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "pytorch_index=$PYTORCH_INDEX" >> $GITHUB_OUTPUT

  start-validation-runner:
    name: Start GPU EC2 runner for validation
    needs: [pr-flags, fvdb-rc-build, discover-fvdb-core]
    if: ${{ !cancelled() && needs.discover-fvdb-core.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420032683002:role/openvdb-fvdb-github-actions-role
          aws-region: us-east-2
      - name: Start EC2 GPU runner
        id: start-validation-runner
        uses: machulav/ec2-github-runner@v2.4.3
        with:
          mode: start
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ami-0f5c0b65fde08ae43
          ec2-instance-type: g6.xlarge
          subnet-id: subnet-03f2320d6e6e0005b
          security-group-id: sg-0cd08bd89d6212223
    outputs:
      label: ${{ steps.start-validation-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-validation-runner.outputs.ec2-instance-id }}

  validate-smoke-test:
    name: Smoke test fvdb-core + fvdb-reality-capture
    needs: [start-validation-runner, discover-fvdb-core, fvdb-rc-build, pr-flags]
    if: ${{ !cancelled() && needs.start-validation-runner.result == 'success' }}
    runs-on: ${{ needs.start-validation-runner.outputs.label }}
    container:
      image: nvidia/cuda:${{ needs.discover-fvdb-core.outputs.cuda-image-tag }}-cudnn-runtime-ubuntu22.04
      env:
        PYTHONPATH: ""
      options: --rm
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Install prerequisites
        run: apt update && apt install -y git wget

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          AGENT_TOOLSDIRECTORY: "/opt/hostedtoolcache"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: fvdb-rc-dist
          path: dist

      - name: Install fvdb-core from S3 staging and fvdb-reality-capture wheel
        run: |
          python3 -m pip install --no-cache-dir \
            torch==${{ needs.discover-fvdb-core.outputs.torch-version }} \
            --extra-index-url ${{ needs.discover-fvdb-core.outputs.pytorch-index }}
          python3 -m pip install --no-cache-dir \
            fvdb-core \
            --extra-index-url https://fvdb-packages.s3.us-east-2.amazonaws.com/simple-staging/
          python3 -m pip install dist/fvdb_reality_capture-*.whl

      - name: Smoke test
        run: |
          python3 -c "
          import fvdb
          import torch
          print(f'fvdb-core version: {fvdb.__version__}')
          print(f'torch version: {torch.__version__}')
          print(f'CUDA available: {torch.cuda.is_available()}')
          assert torch.cuda.is_available(), 'CUDA not available'

          ijk = fvdb.JaggedTensor([torch.tensor([[0,0,0],[1,1,1]], device='cuda')])
          grid = fvdb.GridBatch.from_ijk(ijk)
          print(f'GridBatch: {grid.total_voxels} voxels on {grid.device}')

          import fvdb_reality_capture
          print(f'fvdb-reality-capture version: {fvdb_reality_capture.__version__}')
          print('Smoke test PASSED')
          "

  validate-unit-tests:
    name: Full unit tests
    needs: [start-validation-runner, discover-fvdb-core, validate-smoke-test, pr-flags]
    if: ${{ !cancelled() && needs.validate-smoke-test.result == 'success' && (needs.pr-flags.outputs.release_push == 'true' || inputs.run_validation == true) }}
    runs-on: ${{ needs.start-validation-runner.outputs.label }}
    container:
      image: nvidia/cuda:${{ needs.discover-fvdb-core.outputs.cuda-image-tag }}-cudnn-runtime-ubuntu22.04
      env:
        PYTHONPATH: ""
      options: --rm
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites
        run: apt update && apt install -y git wget

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          AGENT_TOOLSDIRECTORY: "/opt/hostedtoolcache"

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: fvdb-rc-dist
          path: dist

      - name: Install fvdb-core from S3 staging
        run: |
          python3 -m pip install --no-cache-dir \
            torch==${{ needs.discover-fvdb-core.outputs.torch-version }} torchvision \
            --extra-index-url ${{ needs.discover-fvdb-core.outputs.pytorch-index }}
          python3 -m pip install --no-cache-dir \
            fvdb-core \
            --extra-index-url https://fvdb-packages.s3.us-east-2.amazonaws.com/simple-staging/

      - name: Install fvdb-reality-capture with test dependencies
        run: |
          python3 -m pip install "dist/fvdb_reality_capture-*.whl[benchmark]"
          python3 -m pip install pytest matplotlib

      - name: Run unit and benchmark contract tests
        run: |
          cd tests
          pytest -v unit benchmarks/test_benchmark_contract.py benchmarks/test_comparison_benchmark.py

  stop-validation-runner:
    name: Stop GPU EC2 runner for validation
    needs:
      - start-validation-runner
      - validate-smoke-test
      - validate-unit-tests
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-validation-runner.result != 'skipped' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::420032683002:role/openvdb-fvdb-github-actions-role
          aws-region: us-east-2
      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2.4.3
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-validation-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-validation-runner.outputs.ec2-instance-id }}
